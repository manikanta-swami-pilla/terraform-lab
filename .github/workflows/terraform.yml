name: Terraform CI/CD

on:
  push:
    paths:
      - 'Infra_mgmt_via_terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    paths:
      - 'Infra_mgmt_via_terraform/**'
      - '.github/workflows/terraform.yml'

env:
  TF_VAR_region: ${{ vars.REGION }}
  TF_VAR_instance_type: ${{ vars.INSTANCE_TYPE }}
  TF_VAR_ami_id: ${{ vars.AMI_ID }}
  TF_VAR_instance_name_tag: ${{ vars.INSTANCE_NAME_TAG }}

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_DEV }}   # stored securely in GitHub vars
          aws-region: ${{ vars.REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        working-directory: Infra_mgmt_via_terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: Infra_mgmt_via_terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: Infra_mgmt_via_terraform
        run: terraform plan

  terraform-apply:
    needs: terraform-plan
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_PROD }}   # stored securely in GitHub vars
          aws-region: ${{ vars.REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        working-directory: Infra_mgmt_via_terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: Infra_mgmt_via_terraform
        run: terraform apply -auto-approve